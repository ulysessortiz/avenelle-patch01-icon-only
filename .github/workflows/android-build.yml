name: Build Avenelle Patch 01 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate Patch 01 source ZIP
        run: |
          set -e
          echo "Repository files:"
          ls -la

          ZIP_COUNT=$(ls Avenelle_PATCH01_ICON_ONLY_SOURCE_DO_NOT_EXTRACT*.zip 2>/dev/null | wc -l)

          if [ "$ZIP_COUNT" -ne 1 ]; then
            echo "Expected exactly one Avenelle Patch 01 ZIP, found $ZIP_COUNT."
            echo "Matching ZIP files:"
            ls -la Avenelle_PATCH01_ICON_ONLY_SOURCE_DO_NOT_EXTRACT*.zip || true
            exit 1
          fi

          ZIP_FILE=$(ls Avenelle_PATCH01_ICON_ONLY_SOURCE_DO_NOT_EXTRACT*.zip | head -n 1)
          echo "PATCH_ZIP=$ZIP_FILE" >> $GITHUB_ENV
          echo "Using Patch 01 source ZIP: $ZIP_FILE"

      - name: Unzip Avenelle source
        run: |
          set -e
          rm -rf extracted
          unzip "$PATCH_ZIP" -d extracted

          echo "Extracted preview:"
          find extracted -maxdepth 4 -type f | sort | head -200

      - name: Locate Android project
        run: |
          set -e
          PROJECT_DIR=$(find extracted -name settings.gradle -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "No Android project found. settings.gradle missing."
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Android project found at: $PROJECT_DIR"

      - name: Verify required Android files
        run: |
          set -e
          test -f "$PROJECT_DIR/settings.gradle"
          test -f "$PROJECT_DIR/build.gradle"
          test -f "$PROJECT_DIR/app/build.gradle"

          if [ ! -d "$PROJECT_DIR/app/src/main" ]; then
            echo "Missing app/src/main folder."
            exit 1
          fi

          echo "Required Android files found."

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        run: |
          set -e
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Avenelle-Patch01-APK
          path: extracted/**/app/build/outputs/apk/debug/*.apk
